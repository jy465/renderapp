<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; }
        form { margin-bottom: 20px; }
        input[type=text] { width: 80%; padding: 8px; }
        button { padding: 8px 16px; background: #0066cc; color: white; border: none; cursor: pointer; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        a { color: red; text-decoration: none; }
    </style>
</head>
<body>
    <h1>📝 My Notes</h1>
    <form action="/add" method="POST">
        <input type="text" name="content" placeholder="Enter a note..." required>
        <button type="submit">Add Note</button>
    </form>
    <ul>
        {% for note in notes %}
        <li>
            <span>{{ note[1] }} <small>({{ note[2].strftime('%Y-%m-%d %H:%M') }})</small></span>
            <a href="/delete/{{ note[0] }}">Delete</a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
